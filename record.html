<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分数记录 - 卡皮成长小屋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="parent-shell record-shell">
    <header class="parent-hero">
      <div>
        <p class="eyebrow">Score Journal</p>
        <h1>分数记录页</h1>
        <p class="hero-note">选择今天完成的活动，写下做了什么，再给自己一个小评分。</p>
      </div>
      <div class="parent-actions">
        <a class="back-link" href="index.html">返回首页</a>
        <a class="back-link" href="parent.html">家长设置</a>
      </div>
    </header>

    <section class="record-summary">
      <article class="big-card score-card">
        <div class="card-label">当前积分</div>
        <div class="score-line"><span id="scoreValue">0</span><small>分</small></div>
      </article>
      <article class="big-card">
        <div class="card-label">今日已记录</div>
        <div class="score-line"><span id="todayCount">0</span><small>项</small></div>
      </article>
      <article class="big-card">
        <div class="card-label">今日自评分</div>
        <div class="score-line"><span id="avgRating">0</span><small>/5</small></div>
      </article>
    </section>

    <section class="record-board" id="recordBoard"></section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    let state = KidDojo.load();
    const $ = selector => document.querySelector(selector);
    const els = {
      scoreValue: $("#scoreValue"),
      todayCount: $("#todayCount"),
      avgRating: $("#avgRating"),
      recordBoard: $("#recordBoard"),
      toast: $("#toast")
    };

    function render() {
      const entries = KidDojo.todayEntries(state).filter(item => item.kind !== "redeem");
      const ratings = entries.map(item => Number(item.rating || 0)).filter(Boolean);
      const avg = ratings.length ? (ratings.reduce((sum, item) => sum + item, 0) / ratings.length).toFixed(1) : "0";
      els.scoreValue.textContent = state.score;
      els.todayCount.textContent = entries.length;
      els.avgRating.textContent = avg;
      els.recordBoard.innerHTML = state.categories.map(renderCategory).join("");
      bindRecordButtons();
      KidDojo.save(state);
    }

    function renderCategory(category) {
      const activities = state.activities.filter(item => item.categoryId === category.id);
      if (!activities.length) return "";
      return `
        <article class="record-category">
          <div class="record-category-head" style="--cat:${category.color}">
            <span>${KidDojo.escapeHtml(category.icon)}</span>
            <div>
              <h2>${KidDojo.escapeHtml(category.name)}</h2>
              <p>${activities.length} 个可记录活动</p>
            </div>
          </div>
          <div class="record-table">
            <div class="record-row record-row-head">
              <span>活动</span>
              <span>积分</span>
              <span>完成了什么</span>
              <span>自评分</span>
              <span>记录</span>
            </div>
            ${activities.map(renderActivity).join("")}
          </div>
        </article>
      `;
    }

    function renderActivity(activity) {
      const done = KidDojo.todayEntries(state).filter(item => item.activityId === activity.id).length;
      return `
        <div class="record-row" data-activity="${activity.id}">
          <div class="record-activity">
            <strong>${KidDojo.escapeHtml(activity.name)}</strong>
            <small>${KidDojo.escapeHtml(activity.note || "完成后记录")}${done ? ` · 今日已 ${done} 次` : ""}</small>
          </div>
          <b class="record-points">+${Number(activity.points)}</b>
          <input class="record-detail" placeholder="例如：读了第 3 章、完成 20 道题">
          <select class="record-rating" aria-label="自评分">
            <option value="5">5 很棒</option>
            <option value="4">4 不错</option>
            <option value="3">3 完成</option>
            <option value="2">2 勉强</option>
            <option value="1">1 需要加油</option>
          </select>
          <button class="primary-btn record-submit">提交</button>
        </div>
      `;
    }

    function bindRecordButtons() {
      els.recordBoard.querySelectorAll(".record-submit").forEach(button => {
        button.addEventListener("click", () => {
          const row = button.closest(".record-row");
          const activityId = row.dataset.activity;
          const activity = state.activities.find(item => item.id === activityId);
          const detail = row.querySelector(".record-detail").value.trim();
          const rating = row.querySelector(".record-rating").value;
          state = KidDojo.recordActivity(state, activityId, { detail, rating });
          showToast(`${activity.name} +${activity.points} 分，记录成功。`);
          render();
        });
      });
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2100);
    }

    render();
  </script>
</body>
</html>
