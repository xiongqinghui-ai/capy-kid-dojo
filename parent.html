<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家长设置 - 卡皮成长小屋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="parent-shell">
    <header class="parent-hero">
      <div>
        <p class="eyebrow">Parent Console</p>
        <h1>家长设置</h1>
        <p class="hero-note">这里管理活动、愿望和备份；孩子首页只保留打卡和展示。</p>
      </div>
      <div class="parent-actions">
        <a class="back-link" href="index.html">返回孩子首页</a>
        <button class="soft-btn" id="exportBtn">导出备份</button>
        <button class="soft-btn" id="importBtn">导入数据</button>
        <button class="danger-btn" id="resetBtn">恢复演示</button>
      </div>
    </header>

    <section class="parent-grid">
      <article class="parent-panel">
        <h2>孩子信息</h2>
        <form class="form-grid" id="childForm">
          <label>
            昵称
            <input id="childName" placeholder="孩子昵称">
          </label>
          <label>
            首页标题
            <input id="homeTitle" placeholder="例如：Leo 的卡皮能量站">
          </label>
          <label>
            头像路径
            <input id="childAvatar" placeholder="assets/avatar.png">
          </label>
          <button class="primary-btn" type="submit">保存孩子信息</button>
        </form>
      </article>

      <article class="parent-panel">
        <h2>新增活动</h2>
        <form class="form-grid" id="activityForm">
          <label>
            分类
            <input id="activityCategory" type="hidden" value="study">
            <div class="category-picker" id="activityCategoryPicker"></div>
          </label>
          <label>
            活动名称
            <input id="activityName" placeholder="例如：英语阅读 20 分钟" required>
          </label>
          <div class="two-cols">
            <label>
              积分
              <input id="activityPoints" type="number" min="1" max="200" value="5" required>
            </label>
            <label>
              每日目标次数
              <input id="activityTarget" type="number" min="1" max="10" value="1" required>
            </label>
          </div>
          <label>
            完成标准
            <textarea id="activityNote" placeholder="例如：能复述主要内容"></textarea>
          </label>
          <button class="primary-btn" type="submit">添加活动</button>
        </form>
      </article>

      <article class="parent-panel">
        <h2>活动列表</h2>
        <div class="config-list" id="activityList"></div>
      </article>

      <article class="parent-panel">
        <h2>愿望设置</h2>
        <form class="form-grid" id="wishForm">
          <label>
            愿望名称
            <input id="wishName" placeholder="例如：新冰球杆" required>
          </label>
          <div class="two-cols">
            <label>
              所需积分
              <input id="wishCost" type="number" min="1" value="100" required>
            </label>
            <label>
              图标
              <select id="wishIcon">
                <option>🎁</option>
                <option>🏒</option>
                <option>📚</option>
                <option>🎷</option>
                <option>🏇</option>
                <option>🚀</option>
                <option>🎮</option>
              </select>
            </label>
          </div>
          <button class="primary-btn" type="submit">添加愿望</button>
        </form>
        <div class="config-list" id="wishList" style="margin-top:14px;"></div>
      </article>
    </section>
  </main>

  <input class="file-input" id="fileInput" type="file" accept="application/json">
  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    let state = KidDojo.load();
    const $ = selector => document.querySelector(selector);
    const els = {
      childForm: $("#childForm"),
      childName: $("#childName"),
      homeTitle: $("#homeTitle"),
      childAvatar: $("#childAvatar"),
      activityForm: $("#activityForm"),
      activityCategory: $("#activityCategory"),
      activityCategoryPicker: $("#activityCategoryPicker"),
      activityName: $("#activityName"),
      activityPoints: $("#activityPoints"),
      activityTarget: $("#activityTarget"),
      activityNote: $("#activityNote"),
      activityList: $("#activityList"),
      wishForm: $("#wishForm"),
      wishName: $("#wishName"),
      wishCost: $("#wishCost"),
      wishIcon: $("#wishIcon"),
      wishList: $("#wishList"),
      fileInput: $("#fileInput"),
      toast: $("#toast")
    };

    function render() {
      els.childName.value = state.child.name || "";
      els.homeTitle.value = state.child.homeTitle || `${state.child.name || "小小队长"}的成长小屋`;
      els.childAvatar.value = state.child.avatar || "assets/avatar.png";
      if (!state.categories.some(category => category.id === els.activityCategory.value)) {
        els.activityCategory.value = state.categories[0]?.id || "study";
      }
      renderCategoryPicker();
      renderActivities();
      renderWishes();
      KidDojo.save(state);
    }

    function renderCategoryPicker() {
      els.activityCategoryPicker.innerHTML = state.categories.map(category => `
        <button type="button" class="${category.id === els.activityCategory.value ? "active" : ""}" data-id="${category.id}" style="--cat:${category.color}">
          <span>${KidDojo.escapeHtml(category.icon)}</span>${KidDojo.escapeHtml(category.name)}
        </button>
      `).join("");
      els.activityCategoryPicker.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          els.activityCategory.value = btn.dataset.id;
          renderCategoryPicker();
        });
      });
    }

    function renderActivities() {
      if (!state.activities.length) {
        els.activityList.innerHTML = `<div class="empty">还没有活动。</div>`;
        return;
      }
      els.activityList.innerHTML = state.activities.map(activity => {
        const category = KidDojo.categoryById(state, activity.categoryId);
        return `
          <article class="config-item">
            <div>
              <strong>${KidDojo.escapeHtml(activity.name)}</strong>
              <small>${KidDojo.escapeHtml(category.name)} · +${activity.points} 分 · 每日 ${activity.targetPerDay || 1} 次 · ${KidDojo.escapeHtml(activity.note || "无说明")}</small>
            </div>
            <div class="config-actions">
              <button class="mini-btn" data-edit="${activity.id}">加 1 分</button>
              <button class="mini-btn" data-minus="${activity.id}">减 1 分</button>
              <button class="danger-btn" data-delete="${activity.id}">删除</button>
            </div>
          </article>
        `;
      }).join("");
      els.activityList.querySelectorAll("[data-edit]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.activities.find(activity => activity.id === btn.dataset.edit);
          item.points += 1;
          render();
        });
      });
      els.activityList.querySelectorAll("[data-minus]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.activities.find(activity => activity.id === btn.dataset.minus);
          item.points = Math.max(1, item.points - 1);
          render();
        });
      });
      els.activityList.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (!confirm("确定删除这个活动吗？历史记录会保留。")) return;
          state.activities = state.activities.filter(activity => activity.id !== btn.dataset.delete);
          render();
          showToast("活动已删除。");
        });
      });
    }

    function renderWishes() {
      const wishes = state.wishes.filter(wish => wish.status !== "redeemed");
      if (!wishes.length) {
        els.wishList.innerHTML = `<div class="empty">还没有愿望。</div>`;
        return;
      }
      els.wishList.innerHTML = wishes.map(wish => {
        const active = wish.id === state.activeWishId;
        const left = Math.max(0, wish.cost - state.score);
        return `
          <article class="config-item">
            <div>
              <strong>${KidDojo.escapeHtml(wish.icon || "🎁")} ${KidDojo.escapeHtml(wish.name)} ${active ? "· 当前目标" : ""}</strong>
              <small>需要 ${wish.cost} 分 · 当前还差 ${left} 分</small>
            </div>
            <div class="config-actions">
              <button class="mini-btn" data-active="${wish.id}">设为目标</button>
              <button class="danger-btn" data-delete-wish="${wish.id}">删除</button>
            </div>
          </article>
        `;
      }).join("");
      els.wishList.querySelectorAll("[data-active]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.activeWishId = btn.dataset.active;
          render();
          showToast("已设为当前目标。");
        });
      });
      els.wishList.querySelectorAll("[data-delete-wish]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (!confirm("确定删除这个愿望吗？")) return;
          state.wishes = state.wishes.filter(wish => wish.id !== btn.dataset.deleteWish);
          if (state.activeWishId === btn.dataset.deleteWish) {
            state.activeWishId = state.wishes.find(wish => wish.status !== "redeemed")?.id || "";
          }
          render();
          showToast("愿望已删除。");
        });
      });
    }

    els.childForm.addEventListener("submit", event => {
      event.preventDefault();
      state.child.name = els.childName.value.trim() || "小小队长";
      state.child.homeTitle = els.homeTitle.value.trim() || `${state.child.name}的成长小屋`;
      state.child.avatar = els.childAvatar.value.trim() || "assets/avatar.png";
      render();
      showToast("孩子信息已保存。");
    });

    els.activityForm.addEventListener("submit", event => {
      event.preventDefault();
      state.activities.push({
        id: KidDojo.uid("act"),
        categoryId: els.activityCategory.value,
        name: els.activityName.value.trim(),
        points: Math.max(1, Number(els.activityPoints.value)),
        targetPerDay: Math.max(1, Number(els.activityTarget.value)),
        note: els.activityNote.value.trim()
      });
      state.activeCategoryId = els.activityCategory.value;
      els.activityName.value = "";
      els.activityPoints.value = "5";
      els.activityTarget.value = "1";
      els.activityNote.value = "";
      render();
      showToast("活动已添加。");
    });

    els.wishForm.addEventListener("submit", event => {
      event.preventDefault();
      const wish = {
        id: KidDojo.uid("wish"),
        name: els.wishName.value.trim(),
        cost: Math.max(1, Number(els.wishCost.value)),
        icon: els.wishIcon.value,
        status: "open"
      };
      state.wishes.push(wish);
      state.activeWishId = wish.id;
      els.wishName.value = "";
      els.wishCost.value = "100";
      render();
      showToast("愿望已添加。");
    });

    $("#exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `capy-kid-dojo-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("备份已导出。");
    });

    $("#importBtn").addEventListener("click", () => els.fileInput.click());
    els.fileInput.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        state = KidDojo.migrate(JSON.parse(await file.text()));
        render();
        showToast("导入成功。");
      } catch {
        showToast("导入失败，请检查文件。");
      } finally {
        els.fileInput.value = "";
      }
    });

    $("#resetBtn").addEventListener("click", () => {
      if (!confirm("恢复演示数据会覆盖当前数据，确定吗？")) return;
      state = KidDojo.reset();
      render();
      showToast("已恢复演示数据。");
    });

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2100);
    }

    render();
  </script>
</body>
</html>
